name: Verificar aciertos de señales (track record)

# Una vez al día, tras el cierre del mercado, revisa las señales "abiertas" y
# decide acierto/fallo (target1 vs stop) escribiendo el resultado en el log.
# No manda Telegram ni depende de horario: solo lee precios de Yahoo y persiste.
on:
  schedule:
    # 21:30 UTC = 17:30 ET (verano) / 16:30 ET (invierno): siempre DESPUÉS del
    # cierre (16:00 ET) en ambos husos, con margen para que Yahoo cierre la vela.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:        # botón para revisar a mano desde "Actions"

# Necesario para commitear de vuelta el log con los resultados.
permissions:
  contents: write

concurrency:
  group: signals-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Verificar señales abiertas
        working-directory: backend
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python run_monitor.py review

      - name: Persistir resultados (commit de vuelta)
        run: |
          if [ -n "$(git status --porcelain backend/data/signals_log.json)" ]; then
            git config user.name "millionaire-bot"
            git config user.email "actions@users.noreply.github.com"
            git add backend/data/signals_log.json
            git commit -m "chore: resultados de señales verificadas [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "Sin señales que actualizar; nada que commitear."
          fi
